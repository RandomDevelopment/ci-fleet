version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      routine-actions:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gomod
    directory: /controller
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      routine-go:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /controller
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      routine-controller-images:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /runner
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
    groups:
      routine-runner-images:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
