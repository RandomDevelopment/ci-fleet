name: Validate configuration

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: config-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # This public template must never receive access to self-hosted runners.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Validate shell and Python syntax
        run: |
          bash -n scripts/init.sh scripts/validate.sh
          python3 -m py_compile scripts/init.py scripts/validate.py scripts/test_policy.py

      - name: Prove forbidden configurations fail closed
        run: python3 scripts/test_policy.py

      - name: Validate reference configurations
        run: |
          ./scripts/validate.sh
          ./scripts/validate.sh --config examples/multi-host/fleet.json

      - name: Prove initialized configurations pass strict policy
        run: |
          temporary_directory="$(mktemp -d)"
          if ./scripts/init.sh \
            --organization test-company \
            --project test-app \
            --output "${temporary_directory}/missing-engine.json"; then
            echo 'initializer accepted a missing engine revision' >&2
            exit 1
          fi
          test ! -e "${temporary_directory}/missing-engine.json"
          if ./scripts/init.sh \
            --organization test-company \
            --project test-app \
            --registry BAD \
            --engine-ref "$(git rev-parse HEAD)" \
            --output "${temporary_directory}/invalid.json"; then
            echo 'initializer accepted an invalid registry' >&2
            exit 1
          fi
          test ! -e "${temporary_directory}/invalid.json"
          ./scripts/init.sh \
            --organization test-company \
            --project test-app \
            --engine-ref "$(git rev-parse HEAD)" \
            --output "${temporary_directory}/fleet.json"
          test "$(stat -c '%a' "${temporary_directory}/fleet.json")" = 644
